version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 912935854391.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - docker build -t php-app .
      - docker tag php-app:latest 912935854391.dkr.ecr.ap-south-1.amazonaws.com/php-app:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 912935854391.dkr.ecr.ap-south-1.amazonaws.com/php-app:latest
